services:
  postgres:
    image: postgres:17-alpine
    container_name: saversure-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: saversure
      POSTGRES_USER: saversure_app
      POSTGRES_PASSWORD: julaherb789
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saversure_app -d saversure"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: saversure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2-alpine
    container_name: saversure-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js -sd /data -m 8222
    volumes:
      - nats-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pg-data:
  redis-data:
  nats-data:
